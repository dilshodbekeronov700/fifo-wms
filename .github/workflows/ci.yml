name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Lint (ruff)
        run: poetry run ruff check app
      - name: Tests (pytest)
        run: poetry run pytest

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependency vulnerability audit (pip-audit)
        # Ma'lum CVE'lar uchun bog'liqliklarni tekshiradi. Topilsa ogohlantiradi
        # (hozircha bloklamaydi — baza tozalanganidan keyin continue-on-error olib tashlanadi).
        run: pipx run pip-audit || true
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (verify Dockerfile)
        run: docker build -t wms-backend:ci ./wms
