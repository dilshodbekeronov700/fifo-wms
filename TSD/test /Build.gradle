plugins {
    id 'com.android.application' version '8.5.2'
}

android {
    namespace "com.tsd.scannerlogger"
    compileSdk 34

    defaultConfig {
        applicationId "com.tsd.scannerlogger"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}